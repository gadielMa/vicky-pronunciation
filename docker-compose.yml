services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vicky_pronunciation
      POSTGRES_USER: vicky
      POSTGRES_PASSWORD: vicky_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://vicky:vicky_secret@db:5432/vicky_pronunciation?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
